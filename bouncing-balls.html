<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bouncing Balls</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a1e;
      font-family: system-ui, sans-serif;
      color: #e8e8ec;
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0 0 0.75rem;
      letter-spacing: 0.02em;
    }
    #arena-wrap {
      border: 3px solid #3d3d44;
      border-radius: 8px;
      background: #121214;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
    }
    canvas {
      display: block;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <h1>Red & blue balls · rectangle bounce</h1>
  <div id="arena-wrap">
    <canvas id="arena" width="720" height="420" aria-label="Bouncing balls animation"></canvas>
  </div>

  <script>
    (function () {
      const canvas = document.getElementById("arena");
      const ctx = canvas.getContext("2d");

      const W = canvas.width;
      const H = canvas.height;
      const COLORS = ["#e63946", "#1d3557"];

      const balls = [];
      const count = 14;
      const minR = 10;
      const maxR = 22;

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      for (let i = 0; i < count; i++) {
        const r = rand(minR, maxR);
        balls.push({
          x: rand(r, W - r),
          y: rand(r, H - r),
          vx: rand(-3.2, 3.2) || 1,
          vy: rand(-3.2, 3.2) || 1,
          r,
          color: COLORS[i % 2],
        });
      }

      function step() {
        for (const b of balls) {
          b.x += b.vx;
          b.y += b.vy;

          if (b.x - b.r <= 0) {
            b.x = b.r;
            b.vx = Math.abs(b.vx);
          } else if (b.x + b.r >= W) {
            b.x = W - b.r;
            b.vx = -Math.abs(b.vx);
          }

          if (b.y - b.r <= 0) {
            b.y = b.r;
            b.vy = Math.abs(b.vy);
          } else if (b.y + b.r >= H) {
            b.y = H - b.r;
            b.vy = -Math.abs(b.vy);
          }
        }
      }

      function draw() {
        ctx.fillStyle = "#0f0f12";
        ctx.fillRect(0, 0, W, H);

        ctx.strokeStyle = "#2a2a30";
        ctx.lineWidth = 1;
        for (let x = 0; x < W; x += 40) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, H);
          ctx.stroke();
        }
        for (let y = 0; y < H; y += 40) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(W, y);
          ctx.stroke();
        }

        for (const b of balls) {
          const g = ctx.createRadialGradient(
            b.x - b.r * 0.35,
            b.y - b.r * 0.35,
            0,
            b.x,
            b.y,
            b.r
          );
          g.addColorStop(0, lighten(b.color, 0.35));
          g.addColorStop(1, b.color);
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
          ctx.fillStyle = g;
          ctx.fill();
        }
      }

      function lighten(hex, amt) {
        const n = hex.replace("#", "");
        const r = parseInt(n.slice(0, 2), 16);
        const g = parseInt(n.slice(2, 4), 16);
        const b = parseInt(n.slice(4, 6), 16);
        const mix = (c) => Math.min(255, Math.round(c + (255 - c) * amt));
        return `rgb(${mix(r)},${mix(g)},${mix(b)})`;
      }

      function loop() {
        step();
        draw();
        requestAnimationFrame(loop);
      }

      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
